<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Goal Command — Progress Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0A0A0A; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const initialGoals = [
      { id: 1, name: "Read 30 books", priority: "High", timePitched: 60, timeGiven: 90, tasksDone: 12, totalTasks: 30, dailyQuota: 1, todayDone: 0, color: "#FF6B35" },
      { id: 2, name: "Learn Spanish", priority: "Medium", timePitched: 30, timeGiven: 60, tasksDone: 45, totalTasks: 100, dailyQuota: 3, todayDone: 0, color: "#00D9F5" },
      { id: 3, name: "Run 5K daily", priority: "High", timePitched: 14, timeGiven: 30, tasksDone: 8, totalTasks: 30, dailyQuota: 1, todayDone: 0, color: "#A8FF3E" },
      { id: 4, name: "Build Portfolio", priority: "Low", timePitched: 45, timeGiven: 120, tasksDone: 3, totalTasks: 20, dailyQuota: 1, todayDone: 0, color: "#FF3EF0" },
    ];

    const priorityRank   = { High: 3, Medium: 2, Low: 1 };
    const priorityColors = { High: "#FF6B35", Medium: "#FFD700", Low: "#00D9F5" };
    const ACCENT_PALETTE = ["#FF6B35","#00D9F5","#A8FF3E","#FF3EF0","#FFD700","#FF3E3E","#B48EFF","#FF9F1C"];

    function App() {
      const [goals, setGoals]           = useState(() => {
        try { const s = localStorage.getItem("gc_goals"); return s ? JSON.parse(s) : initialGoals; } catch { return initialGoals; }
      });
      const [showModal, setShowModal]   = useState(false);
      const [editingGoal, setEditingGoal] = useState(null);
      const [form, setForm]             = useState({ name:"", priority:"Medium", timePitched:"", timeGiven:"", totalTasks:"", dailyQuota:"", color:"#FF6B35" });
      const [sortBy, setSortBy]         = useState("priority");
      const [errors, setErrors]         = useState({});

      useEffect(() => {
        try { localStorage.setItem("gc_goals", JSON.stringify(goals)); } catch {}
      }, [goals]);

      const now     = new Date();
      const dateStr = now.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" });

      const overallProgress = goals.length
        ? Math.round(goals.reduce((s, g) => s + (g.tasksDone / g.totalTasks) * 100, 0) / goals.length)
        : 0;
      const todayComplete = goals.filter(g => g.todayDone >= g.dailyQuota).length;

      const sorted = [...goals].sort((a, b) => {
        if (sortBy === "priority") return priorityRank[b.priority] - priorityRank[a.priority];
        if (sortBy === "progress") return (b.tasksDone / b.totalTasks) - (a.tasksDone / a.totalTasks);
        if (sortBy === "deadline") return a.timeGiven - b.timeGiven;
        return 0;
      });

      const validate = (f) => {
        const e = {};
        if (!f.name.trim())          e.name        = "Required";
        if (!f.timePitched || +f.timePitched <= 0) e.timePitched = "Must be > 0";
        if (!f.timeGiven   || +f.timeGiven   <= 0) e.timeGiven   = "Must be > 0";
        if (!f.totalTasks  || +f.totalTasks  <= 0) e.totalTasks  = "Must be > 0";
        if (!f.dailyQuota  || +f.dailyQuota  <= 0) e.dailyQuota  = "Must be > 0";
        return e;
      };

      const openAdd  = () => { setEditingGoal(null); setForm({ name:"", priority:"Medium", timePitched:"", timeGiven:"", totalTasks:"", dailyQuota:"", color:"#FF6B35" }); setErrors({}); setShowModal(true); };
      const openEdit = (g) => { setEditingGoal(g.id); setForm({ name:g.name, priority:g.priority, timePitched:g.timePitched, timeGiven:g.timeGiven, totalTasks:g.totalTasks, dailyQuota:g.dailyQuota, color:g.color }); setErrors({}); setShowModal(true); };

      const saveGoal = () => {
        const e = validate(form);
        if (Object.keys(e).length) { setErrors(e); return; }
        const base = { ...form, timePitched:+form.timePitched, timeGiven:+form.timeGiven, totalTasks:+form.totalTasks, dailyQuota:+form.dailyQuota };
        if (editingGoal) {
          setGoals(goals.map(g => g.id === editingGoal ? { ...g, ...base } : g));
        } else {
          setGoals([...goals, { id: Date.now(), ...base, tasksDone: 0, todayDone: 0 }]);
        }
        setShowModal(false);
      };

      const deleteGoal = (id) => { if (window.confirm("Delete this goal?")) setGoals(goals.filter(g => g.id !== id)); };
      const logTask    = (id) => setGoals(goals.map(g => g.id === id && g.tasksDone < g.totalTasks ? { ...g, tasksDone: g.tasksDone+1, todayDone: g.todayDone+1 } : g));
      const undoTask   = (id) => setGoals(goals.map(g => g.id === id && g.tasksDone > 0 ? { ...g, tasksDone: g.tasksDone-1, todayDone: Math.max(0, g.todayDone-1) } : g));
      const resetToday = ()   => setGoals(goals.map(g => ({ ...g, todayDone: 0 })));

      const timeRatio = (g) => Math.min(g.timePitched / g.timeGiven, 1);
      const getStatus = (g) => {
        const prog = g.tasksDone / g.totalTasks;
        if (prog >= 1)           return { label:"COMPLETE", color:"#A8FF3E" };
        if (timeRatio(g) > 0.85) return { label:"AT RISK",  color:"#FF3E3E" };
        if (timeRatio(g) > 0.6)  return { label:"WATCH",    color:"#FFD700" };
        return                          { label:"ON TRACK",  color:"#A8FF3E" };
      };

      return (
        <>
          <style>{`
            body { font-family: 'Courier Prime', 'Courier New', monospace; color: #E0E0E0; }
            .btn { cursor:pointer; border:none; transition:all .15s; font-family:'Courier Prime','Courier New',monospace; font-weight:700; letter-spacing:1px; }
            .btn:hover:not(:disabled) { opacity:.85; transform:scale(.98); }
            .btn:active:not(:disabled) { transform:scale(.95); }
            .btn:disabled { cursor:not-allowed; }
            .goal-card { transition:transform .2s, box-shadow .2s; }
            .goal-card:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,.5); }
            .progress-bar { transition:width .6s cubic-bezier(.4,0,.2,1); }
            .quota-pip { transition:all .2s; }
            @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
            @keyframes slideIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
            .card-enter { animation:slideIn .3s ease forwards; }
            .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px); }
            input,select { background:#1A1A1A;border:1px solid #333;color:#E0E0E0;padding:10px 14px;font-family:'Courier Prime','Courier New',monospace;font-size:13px;width:100%;outline:none;transition:border .2s;border-radius:0; }
            input:focus,select:focus { border-color:#FF6B35; }
            select option { background:#1A1A1A; }
            .sort-btn { background:transparent;border:1px solid #2A2A2A;color:#888;padding:6px 14px;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .15s;font-family:'Courier Prime','Courier New',monospace; }
            .sort-btn.active { border-color:#FF6B35;color:#FF6B35; }
            .sort-btn:hover { border-color:#555;color:#CCC; }
            .field-error { color:#FF3E3E;font-size:10px;margin-top:4px;letter-spacing:1px; }
            .label { font-size:10px;color:#555;letter-spacing:2px;margin-bottom:6px; }
          `}</style>

          {/* ── HEADER ── */}
          <div style={{ background:"#111", borderBottom:"1px solid #1E1E1E", padding:"20px 32px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:12, position:"sticky", top:0, zIndex:50 }}>
            <div>
              <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:34, letterSpacing:5, color:"#FFF", lineHeight:1 }}>GOAL COMMAND</div>
              <div style={{ fontSize:10, color:"#555", letterSpacing:2, marginTop:4 }}>{dateStr.toUpperCase()} · PERSONAL PROGRESS SYSTEM</div>
            </div>
            <div style={{ display:"flex", gap:24, alignItems:"center", flexWrap:"wrap" }}>
              <div style={{ textAlign:"center" }}>
                <div style={{ fontFamily:"'Bebas Neue'", fontSize:38, color:"#FF6B35", lineHeight:1 }}>{overallProgress}%</div>
                <div style={{ fontSize:10, color:"#555", letterSpacing:2 }}>OVERALL</div>
              </div>
              <div style={{ textAlign:"center" }}>
                <div style={{ fontFamily:"'Bebas Neue'", fontSize:38, color:"#A8FF3E", lineHeight:1 }}>{todayComplete}/{goals.length}</div>
                <div style={{ fontSize:10, color:"#555", letterSpacing:2 }}>QUOTA MET</div>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button className="btn" onClick={openAdd} style={{ background:"#FF6B35", color:"#000", padding:"12px 22px", fontSize:12, letterSpacing:2 }}>+ ADD GOAL</button>
                <button className="btn" onClick={resetToday} title="Reset today's quota counts" style={{ background:"transparent", border:"1px solid #2A2A2A", color:"#666", padding:"12px 14px", fontSize:11, letterSpacing:1 }}>↺ RESET DAY</button>
              </div>
            </div>
          </div>

          {/* ── MASTER BAR ── */}
          <div style={{ background:"#0E0E0E", borderBottom:"1px solid #1A1A1A", padding:"12px 32px", display:"flex", alignItems:"center", gap:16 }}>
            <div style={{ fontSize:10, color:"#555", letterSpacing:2, whiteSpace:"nowrap" }}>MASTER PROGRESS</div>
            <div style={{ flex:1, height:6, background:"#1A1A1A", position:"relative", overflow:"hidden" }}>
              <div className="progress-bar" style={{ position:"absolute", left:0, top:0, bottom:0, width:`${overallProgress}%`, background:"linear-gradient(90deg,#FF6B35,#FFD700)" }}/>
            </div>
            <div style={{ fontSize:11, color:"#888", whiteSpace:"nowrap" }}>{overallProgress}% COMPLETE</div>
          </div>

          {/* ── SORT ── */}
          <div style={{ padding:"16px 32px", display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
            <span style={{ fontSize:10, color:"#444", letterSpacing:2, marginRight:4 }}>SORT BY:</span>
            {["priority","progress","deadline"].map(s => (
              <button key={s} className={`sort-btn ${sortBy===s?"active":""}`} onClick={()=>setSortBy(s)}>{s.toUpperCase()}</button>
            ))}
          </div>

          {/* ── GOAL CARDS ── */}
          <div style={{ padding:"0 32px 48px", display:"grid", gap:16 }}>
            {sorted.map((g, i) => {
              const prog     = Math.round((g.tasksDone / g.totalTasks) * 100);
              const status   = getStatus(g);
              const quotaMet = g.todayDone >= g.dailyQuota;
              const pips     = Array.from({ length: Math.min(g.dailyQuota, 20) });
              const tr       = timeRatio(g);

              return (
                <div key={g.id} className="goal-card card-enter"
                  style={{ background:"#111", border:"1px solid #1E1E1E", borderLeft:`3px solid ${g.color}`, padding:"20px 24px", animationDelay:`${i*0.05}s` }}>

                  {/* Title row */}
                  <div style={{ display:"flex", flexWrap:"wrap", gap:12, alignItems:"flex-start", marginBottom:16 }}>
                    <div style={{ flex:1, minWidth:200 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6, flexWrap:"wrap" }}>
                        <div style={{ fontFamily:"'Bebas Neue'", fontSize:24, color:"#FFF", letterSpacing:2 }}>{g.name}</div>
                        <div style={{ fontSize:10, padding:"3px 9px", background:`${status.color}22`, border:`1px solid ${status.color}55`, color:status.color, letterSpacing:1 }}>{status.label}</div>
                      </div>
                      <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
                        <span style={{ fontSize:10, color:priorityColors[g.priority], letterSpacing:1 }}>● {g.priority.toUpperCase()} PRIORITY</span>
                        <span style={{ fontSize:10, color:"#555" }}>PITCHED: <span style={{ color:"#888" }}>{g.timePitched}d</span></span>
                        <span style={{ fontSize:10, color:"#555" }}>GIVEN: <span style={{ color:"#888" }}>{g.timeGiven}d</span></span>
                        <span style={{ fontSize:10, color:"#555" }}>REMAINING: <span style={{ color: (g.timeGiven - g.timePitched) <= 5 ? "#FF3E3E" : "#888" }}>{Math.max(0, g.timeGiven - g.timePitched)}d</span></span>
                      </div>
                    </div>

                    {/* Stats */}
                    <div style={{ display:"flex", gap:20, flexWrap:"wrap" }}>
                      <div style={{ textAlign:"center" }}>
                        <div style={{ fontFamily:"'Bebas Neue'", fontSize:30, color:g.color, lineHeight:1 }}>{prog}%</div>
                        <div style={{ fontSize:9, color:"#444", letterSpacing:1 }}>PROGRESS</div>
                      </div>
                      <div style={{ textAlign:"center" }}>
                        <div style={{ fontFamily:"'Bebas Neue'", fontSize:30, color:"#FFF", lineHeight:1 }}>{g.tasksDone}<span style={{ fontSize:14, color:"#444" }}>/{g.totalTasks}</span></div>
                        <div style={{ fontSize:9, color:"#444", letterSpacing:1 }}>TASKS DONE</div>
                      </div>
                      <div style={{ textAlign:"center" }}>
                        <div style={{ fontFamily:"'Bebas Neue'", fontSize:30, color:quotaMet?"#A8FF3E":"#FF3E3E", lineHeight:1 }}>{g.todayDone}<span style={{ fontSize:14, color:"#444" }}>/{g.dailyQuota}</span></div>
                        <div style={{ fontSize:9, color:"#444", letterSpacing:1 }}>TODAY'S QUOTA</div>
                      </div>
                    </div>
                  </div>

                  {/* Progress bar */}
                  <div style={{ marginBottom:14 }}>
                    <div style={{ height:8, background:"#1A1A1A", position:"relative", overflow:"hidden", marginBottom:4 }}>
                      <div className="progress-bar" style={{ position:"absolute", left:0, top:0, bottom:0, width:`${prog}%`, background:g.color, opacity:.9 }}/>
                      <div style={{ position:"absolute", top:0, bottom:0, left:`${tr*100}%`, width:2, background:"#FFF", opacity:.25 }} title="Time elapsed"/>
                    </div>
                    <div style={{ display:"flex", justifyContent:"space-between", fontSize:9, color:"#333" }}>
                      <span>0%</span>
                      <span style={{ color:"#3A3A3A" }}>▲ TIME ELAPSED ({Math.round(tr*100)}%)</span>
                      <span>100%</span>
                    </div>
                  </div>

                  {/* Quota pips */}
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14, flexWrap:"wrap" }}>
                    <span style={{ fontSize:9, color:"#444", letterSpacing:1 }}>TODAY:</span>
                    <div style={{ display:"flex", gap:4, flexWrap:"wrap" }}>
                      {pips.map((_, pi) => (
                        <div key={pi} className="quota-pip"
                          style={{ width:22, height:22, border:`1px solid ${pi<g.todayDone?g.color:"#2A2A2A"}`, background:pi<g.todayDone?`${g.color}33`:"transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, color:pi<g.todayDone?g.color:"#333" }}>
                          {pi < g.todayDone ? "✓" : "·"}
                        </div>
                      ))}
                      {g.dailyQuota > 20 && <span style={{ fontSize:9, color:"#555" }}>+{g.dailyQuota-20} more</span>}
                    </div>
                    {quotaMet && <span style={{ fontSize:9, color:"#A8FF3E", letterSpacing:1, animation:"pulse 2s infinite" }}>QUOTA MET ✓</span>}
                  </div>

                  {/* Actions */}
                  <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                    <button className="btn" onClick={()=>logTask(g.id)} disabled={g.tasksDone>=g.totalTasks}
                      style={{ background:g.tasksDone>=g.totalTasks?"#1A1A1A":g.color, color:g.tasksDone>=g.totalTasks?"#444":"#000", padding:"8px 20px", fontSize:11, letterSpacing:1 }}>
                      + LOG TASK
                    </button>
                    <button className="btn" onClick={()=>undoTask(g.id)} disabled={g.tasksDone===0}
                      style={{ background:"transparent", border:"1px solid #2A2A2A", color:g.tasksDone===0?"#333":"#666", padding:"8px 16px", fontSize:11, letterSpacing:1 }}>
                      UNDO
                    </button>
                    <button className="btn" onClick={()=>openEdit(g)}
                      style={{ background:"transparent", border:"1px solid #2A2A2A", color:"#888", padding:"8px 16px", fontSize:11, letterSpacing:1, marginLeft:"auto" }}>
                      EDIT
                    </button>
                    <button className="btn" onClick={()=>deleteGoal(g.id)}
                      style={{ background:"transparent", border:"1px solid #2A2A2A", color:"#FF3E3E", padding:"8px 16px", fontSize:11, letterSpacing:1 }}>
                      ✕
                    </button>
                  </div>
                </div>
              );
            })}

            {goals.length === 0 && (
              <div style={{ textAlign:"center", padding:"100px 0", color:"#222" }}>
                <div style={{ fontFamily:"'Bebas Neue'", fontSize:52, letterSpacing:6, marginBottom:12 }}>NO GOALS SET</div>
                <div style={{ fontSize:12, letterSpacing:2, color:"#333" }}>CLICK "+ ADD GOAL" TO BEGIN YOUR JOURNEY</div>
              </div>
            )}
          </div>

          {/* ── MODAL ── */}
          {showModal && (
            <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setShowModal(false)}>
              <div style={{ background:"#111", border:"1px solid #2A2A2A", padding:32, width:"100%", maxWidth:500, maxHeight:"90vh", overflowY:"auto" }}>
                <div style={{ fontFamily:"'Bebas Neue'", fontSize:30, letterSpacing:4, marginBottom:24, color:"#FFF" }}>{editingGoal?"EDIT GOAL":"NEW GOAL"}</div>
                <div style={{ display:"grid", gap:16 }}>

                  {/* Goal name */}
                  <div>
                    <div className="label">GOAL NAME</div>
                    <input type="text" placeholder="e.g. Read 30 books" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
                    {errors.name && <div className="field-error">{errors.name}</div>}
                  </div>

                  {/* Two-col row */}
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                    <div>
                      <div className="label">TIME PITCHED (days)</div>
                      <input type="number" min="1" placeholder="Days elapsed" value={form.timePitched} onChange={e=>setForm({...form,timePitched:e.target.value})}/>
                      {errors.timePitched && <div className="field-error">{errors.timePitched}</div>}
                    </div>
                    <div>
                      <div className="label">TIME GIVEN (days)</div>
                      <input type="number" min="1" placeholder="Total days" value={form.timeGiven} onChange={e=>setForm({...form,timeGiven:e.target.value})}/>
                      {errors.timeGiven && <div className="field-error">{errors.timeGiven}</div>}
                    </div>
                    <div>
                      <div className="label">TOTAL TASKS</div>
                      <input type="number" min="1" placeholder="e.g. 30" value={form.totalTasks} onChange={e=>setForm({...form,totalTasks:e.target.value})}/>
                      {errors.totalTasks && <div className="field-error">{errors.totalTasks}</div>}
                    </div>
                    <div>
                      <div className="label">DAILY QUOTA</div>
                      <input type="number" min="1" placeholder="Tasks/day" value={form.dailyQuota} onChange={e=>setForm({...form,dailyQuota:e.target.value})}/>
                      {errors.dailyQuota && <div className="field-error">{errors.dailyQuota}</div>}
                    </div>
                  </div>

                  {/* Priority */}
                  <div>
                    <div className="label">PRIORITY</div>
                    <select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})}>
                      {["High","Medium","Low"].map(p=><option key={p}>{p}</option>)}
                    </select>
                  </div>

                  {/* Color */}
                  <div>
                    <div className="label">ACCENT COLOR</div>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                      {ACCENT_PALETTE.map(c=>(
                        <div key={c} onClick={()=>setForm({...form,color:c})}
                          style={{ width:34, height:34, background:c, cursor:"pointer", border:form.color===c?"3px solid #FFF":"3px solid transparent", transition:"border .15s" }}/>
                      ))}
                    </div>
                  </div>
                </div>

                <div style={{ display:"flex", gap:10, marginTop:28 }}>
                  <button className="btn" onClick={saveGoal} style={{ flex:1, background:"#FF6B35", color:"#000", padding:14, fontSize:12, letterSpacing:2 }}>SAVE GOAL</button>
                  <button className="btn" onClick={()=>setShowModal(false)} style={{ background:"transparent", border:"1px solid #2A2A2A", color:"#888", padding:"14px 20px", fontSize:12, letterSpacing:1 }}>CANCEL</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
